<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumWebXR - Hello World</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: sans-serif;
            z-index: 100;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>QuantumWebXR Hello World</h1>
        <button id="enter-vr">Enter VR</button>
        <button id="enter-ar">Enter AR</button>
        <p id="status">Click to start</p>
    </div>

    <script type="module">
        import { QuantumEngine } from '../src/quantum-webxr.js';

        async function main() {
            const status = document.getElementById('status');
            
            try {
                // Initialize engine
                const engine = new QuantumEngine({
                    rendering: { antialias: true },
                    physics: { enabled: true }
                });
                
                await engine.initialize();
                status.textContent = 'Engine initialized';
                
                // Create simple world
                const world = await engine.worlds.createWorld({
                    type: 'flat',
                    id: 'hello-world'
                });
                
                await engine.worlds.enterWorld('hello-world', [0, 2, 5]);
                status.textContent = 'World loaded';
                
                // Add some objects
                const box = engine.physics.createBody({
                    shape: 'box',
                    position: [0, 5, 0],
                    mass: 1,
                    mesh: new THREE.Mesh(
                        new THREE.BoxGeometry(1, 1, 1),
                        new THREE.MeshStandardMaterial({ color: 0x00ff00 })
                    )
                });
                
                // Setup UI
                const ui = engine.ui;
                const panel = ui.createPanel('main', {
                    width: 1.2,
                    height: 0.8,
                    position: [0, 1.5, -2]
                });
                
                panel.addElement(new ui.Button({
                    x: 50, y: 50, width: 200, height: 50,
                    text: 'Spawn Cube',
                    onClick: () => spawnCube(engine)
                }));
                
                panel.addElement(new ui.Text({
                    x: 50, y: 150,
                    text: 'Welcome to QuantumWebXR!',
                    fontSize: 24
                }));
                
                ui.openPanel('main');
                
                // Event handlers
                document.getElementById('enter-vr').addEventListener('click', async () => {
                    await engine.enterVR();
                    status.textContent = 'In VR mode';
                });
                
                document.getElementById('enter-ar').addEventListener('click', async () => {
                    await engine.enterAR();
                    status.textContent = 'In AR mode';
                });
                
                // Animation loop
                engine.renderer.setAnimationLoop(() => {
                    engine.update(engine.clock.getDelta());
                    engine.renderer.render();
                });
                
            } catch (e) {
                status.textContent = 'Error: ' + e.message;
                console.error(e);
            }
        }
        
        function spawnCube(engine) {
            const x = (Math.random() - 0.5) * 4;
            const z = (Math.random() - 0.5) * 4;
            
            engine.physics.createBody({
                shape: 'box',
                position: [x, 10, z],
                mass: 1,
                mesh: new THREE.Mesh(
                    new THREE.BoxGeometry(0.5, 0.5, 0.5),
                    new THREE.MeshStandardMaterial({ 
                        color: Math.random() * 0xffffff 
                    })
                )
            });
        }
        
        main();
    </script>
</body>
</html>
