<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumWebXR - Avatar System</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: sans-serif;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            padding: 10px;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>Avatar System Demo</h1>
        <p>Upload VRM avatar or use default</p>
        <input type="file" id="vrm-upload" accept=".vrm" />
        <button id="enter-vr">Enter VR</button>
        <p id="status">Ready</p>
    </div>

    <script type="module">
        import { QuantumEngine } from '../src/quantum-webxr.js';

        async function main() {
            const engine = new QuantumEngine({
                rendering: { antialias: true },
                avatars: {
                    enableLipSync: true,
                    enableEyeTracking: true,
                    ikSolver: 'ccd'
                }
            });
            
            await engine.initialize();
            
            // Load default world
            const world = await engine.worlds.createWorld({
                type: 'flat',
                id: 'avatar-demo'
            });
            await engine.worlds.enterWorld('avatar-demo', [0, 0, 3]);
            
            // Load default avatar
            const defaultAvatar = await engine.avatars.loadAvatar('local', {
                type: 'procedural',
                config: { height: 1.7, style: 'robot' }
            }, { isLocal: true });
            
            document.getElementById('status').textContent = 'Avatar loaded';
            
            // Handle VRM upload
            document.getElementById('vrm-upload').addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                document.getElementById('status').textContent = 'Loading VRM...';
                
                try {
                    const customAvatar = await engine.avatars.loadAvatar('local', file, {
                        isLocal: true,
                        scale: 1
                    });
                    
                    document.getElementById('status').textContent = 'VRM loaded!';
                } catch (err) {
                    document.getElementById('status').textContent = 'Error: ' + err.message;
                }
            });
            
            // Enter VR
            document.getElementById('enter-vr').addEventListener('click', async () => {
                await engine.enterVR();
                document.getElementById('status').textContent = 'In VR - move your head and hands';
            });
            
            // Animation loop
            engine.renderer.setAnimationLoop(() => {
                engine.update(engine.clock.getDelta());
                engine.renderer.render();
            });
        }
        
        main().catch(console.error);
    </script>
</body>
</html>
